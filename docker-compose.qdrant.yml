# Brought up only by `sup-mem setup --backend qdrant`. The service stays warm
# (restart: unless-stopped) so the per-prompt hook borrows its warmth and never spins it up (I2).
services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: sup-mem-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # REST/HTTP
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
