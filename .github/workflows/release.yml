name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build + GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Test (fast suite)
        run: |
          uv sync
          uv run pytest -q -m "not slow and not qdrant"
      - name: Build sdist + wheel
        run: uv build
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "sup-mem ${GITHUB_REF_NAME}" \
            --generate-notes

  pypi:
    name: Publish to PyPI (trusted publishing)
    runs-on: ubuntu-latest
    needs: release  # only publish what passed the release job's test gate
    environment: pypi
    permissions:
      id-token: write  # OIDC — no API token anywhere (PyPI trusted publisher)
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
